<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <rect width="1200" height="900" fill="#fffdf7"/>
  <rect x="54" y="54" width="1092" height="792" fill="#ffffff" stroke="#191919" stroke-width="4"/>
  <rect x="74" y="74" width="1092" height="792" fill="none" stroke="#d9a441" stroke-width="10"/>

  <image href="mch-projects-logo.png" x="86" y="82" width="278" height="205" preserveAspectRatio="xMidYMid meet"/>

  <text x="88" y="302" fill="#191919" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800">A lead should</text>
  <text x="88" y="382" fill="#191919" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800">move like this.</text>
  <text x="92" y="438" fill="#5b6159" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="600">Lead follow-up and onboarding automation for owner-led service businesses.</text>

  <g transform="translate(92 510)">
    <rect x="0" y="0" width="170" height="110" fill="#fff8df" stroke="#191919" stroke-width="3"/>
    <text x="22" y="40" fill="#191919" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">Capture</text>
    <text x="22" y="73" fill="#5b6159" font-family="Arial, Helvetica, sans-serif" font-size="19">Form, call, email</text>
    <circle cx="142" cy="28" r="11" fill="#00b4d8"/>

    <path d="M190 54 H244" stroke="#191919" stroke-width="5"/>
    <path d="M244 54 l-16 -13 v26 z" fill="#191919"/>

    <rect x="270" y="0" width="170" height="110" fill="#ffffff" stroke="#191919" stroke-width="3"/>
    <text x="292" y="40" fill="#191919" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">Qualify</text>
    <text x="292" y="73" fill="#5b6159" font-family="Arial, Helvetica, sans-serif" font-size="19">Need, fit, source</text>
    <circle cx="412" cy="28" r="11" fill="#d9a441"/>

    <path d="M460 54 H514" stroke="#191919" stroke-width="5"/>
    <path d="M514 54 l-16 -13 v26 z" fill="#191919"/>

    <rect x="540" y="0" width="170" height="110" fill="#fff8df" stroke="#191919" stroke-width="3"/>
    <text x="562" y="40" fill="#191919" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">Route</text>
    <text x="562" y="73" fill="#5b6159" font-family="Arial, Helvetica, sans-serif" font-size="19">Owner gets next step</text>
    <circle cx="682" cy="28" r="11" fill="#22c55e"/>

    <path d="M730 54 H784" stroke="#191919" stroke-width="5"/>
    <path d="M784 54 l-16 -13 v26 z" fill="#191919"/>

    <rect x="810" y="0" width="170" height="110" fill="#191919" stroke="#191919" stroke-width="3"/>
    <text x="832" y="40" fill="#f7d66b" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">Follow up</text>
    <text x="832" y="73" fill="#fff8df" font-family="Arial, Helvetica, sans-serif" font-size="19">Email, task, reminder</text>
    <circle cx="952" cy="28" r="11" fill="#f7d66b"/>
  </g>

  <g transform="translate(92 680)">
    <rect x="0" y="0" width="420" height="86" fill="#191919"/>
    <text x="28" y="36" fill="#f7d66b" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" letter-spacing="3">OWNER VIEW</text>
    <text x="28" y="66" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">new -> contacted -> booked -> stalled</text>

    <rect x="452" y="0" width="476" height="86" fill="#fff2bd" stroke="#191919" stroke-width="3"/>
    <text x="480" y="36" fill="#191919" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" letter-spacing="3">FIRST SYSTEM</text>
    <text x="480" y="66" fill="#191919" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">small enough to ship, useful enough to keep</text>
  </g>

  <g transform="translate(856 120)">
    <rect x="0" y="0" width="210" height="236" fill="#fff8df" stroke="#191919" stroke-width="3"/>
    <text x="26" y="44" fill="#191919" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">LEAK MAP</text>
    <line x1="26" y1="70" x2="184" y2="70" stroke="#d9a441" stroke-width="8"/>
    <line x1="26" y1="106" x2="144" y2="106" stroke="#191919" stroke-width="8"/>
    <line x1="26" y1="142" x2="166" y2="142" stroke="#d9a441" stroke-width="8"/>
    <line x1="26" y1="178" x2="118" y2="178" stroke="#191919" stroke-width="8"/>
    <text x="26" y="218" fill="#5b6159" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">No more inbox babysitting.</text>
  </g>
</svg>
