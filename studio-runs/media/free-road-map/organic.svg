<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="MCH Projects workflow road map organic post visual">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0E1726" flood-opacity="0.09"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="#F6F7FA"/>
  <rect x="64" y="56" width="1072" height="788" fill="#FFFFFF" stroke="#E4E7EF" stroke-width="2" filter="url(#cardShadow)"/>

  <g transform="translate(100 92)">
    <rect x="0" y="0" width="36" height="36" rx="9" fill="#0E1726"/>
    <rect x="9" y="9" width="8" height="8" rx="2" fill="#FFFFFF" opacity="0.45"/>
    <rect x="21" y="9" width="8" height="8" rx="2" fill="#FFFFFF" opacity="0.7"/>
    <rect x="9" y="21" width="8" height="8" rx="2" fill="#FFFFFF" opacity="0.7"/>
    <rect x="21" y="21" width="8" height="8" rx="2" fill="#FFFFFF"/>
    <text x="52" y="25" fill="#0E1726" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="800">MCH Projects</text>
    <text x="820" y="25" fill="#1E4DD8" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="900" letter-spacing="2.4">WORKFLOW ROAD MAP</text>
  </g>

  <g transform="translate(100 168)">
    <text x="0" y="74" fill="#0E1726" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700">The first system</text>
    <text x="0" y="144" fill="#1E4DD8" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700">is smaller</text>
    <text x="0" y="214" fill="#0E1726" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700">than you think.</text>

    <text x="3" y="278" fill="#56617A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="500">Start with the messy handoff everyone feels,</text>
    <text x="3" y="316" fill="#56617A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="500">then map the simplest flow that would make</text>
    <text x="3" y="354" fill="#56617A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="500">next week calmer.</text>
  </g>

  <g transform="translate(96 604)" font-family="Arial, Helvetica, sans-serif">
    <rect x="0" y="0" width="1010" height="124" fill="#EEF2FE" stroke="#E2E9FD"/>
    <g transform="translate(34 34)">
      <circle cx="10" cy="10" r="5" fill="#1E4DD8"/>
      <text x="28" y="17" fill="#0E1726" font-size="19" font-weight="800">Capture the real request</text>
    </g>
    <g transform="translate(344 34)">
      <circle cx="10" cy="10" r="5" fill="#E2A33A"/>
      <text x="28" y="17" fill="#0E1726" font-size="19" font-weight="800">Route the next action</text>
    </g>
    <g transform="translate(642 34)">
      <circle cx="10" cy="10" r="5" fill="#1E4DD8"/>
      <text x="28" y="17" fill="#0E1726" font-size="19" font-weight="800">Show what is stuck</text>
    </g>
    <text x="34" y="92" fill="#56617A" font-size="20" font-weight="600">Free road map: one process, one clean flow, one practical first build.</text>
  </g>

  <g transform="translate(648 168)">
    <rect x="0" y="0" width="430" height="372" fill="#F6F7FA" stroke="#E4E7EF" stroke-width="2"/>
    <rect x="26" y="28" width="378" height="316" fill="#FFFFFF" stroke="#E4E7EF"/>

    <g transform="translate(58 61)" stroke="#0E1726" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="72" cy="52" r="26" fill="#EEF2FE"/>
      <path d="M72 82v72"/>
      <path d="M28 118h84"/>
      <path d="M120 118h116"/>
      <path d="M34 180h196"/>
      <rect x="132" y="78" width="136" height="88" rx="8" fill="#FFFFFF"/>
      <path d="M152 104h92M152 126h68M152 148h84"/>
      <path d="M20 210h244"/>
      <rect x="16" y="190" width="252" height="34" rx="4" fill="#EEF2FE"/>
    </g>

    <g font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="800">
      <g transform="rotate(-10 56 240)">
        <rect x="42" y="222" width="96" height="44" rx="6" fill="#FFFFFF" stroke="#C8D0DE" stroke-width="2"/>
        <text x="58" y="249" fill="#56617A">Inbox</text>
      </g>
      <g transform="rotate(8 296 62)">
        <rect x="252" y="44" width="112" height="44" rx="6" fill="#FFFFFF" stroke="#C8D0DE" stroke-width="2"/>
        <text x="268" y="71" fill="#56617A">Quote</text>
      </g>
      <g transform="rotate(7 294 278)">
        <rect x="244" y="258" width="122" height="44" rx="6" fill="#EEF2FE" stroke="#4C74E6" stroke-width="2"/>
        <text x="260" y="285" fill="#1E4DD8">Next step</text>
      </g>
    </g>

    <path d="M232 268H330V204" stroke="#1E4DD8" stroke-width="3" fill="none"/>
    <rect x="318" y="186" width="42" height="36" rx="7" fill="#1E4DD8"/>
    <circle cx="339" cy="204" r="7" fill="#E2A33A"/>
  </g>
</svg>
