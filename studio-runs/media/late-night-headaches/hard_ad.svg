<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="MCH Projects late night business problems ad">
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#E4E7EF" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0E1726" flood-opacity="0.13"/>
    </filter>
    <linearGradient id="photoShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1726" stop-opacity="0.1"/>
      <stop offset="0.75" stop-color="#0E1726" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0E1726" stop-opacity="0.5"/>
    </linearGradient>
    <clipPath id="photoClip">
      <rect x="72" y="72" width="1056" height="492" rx="0"/>
    </clipPath>
  </defs>

  <rect width="1200" height="900" fill="#F6F7FA"/>
  <rect width="1200" height="900" fill="url(#grid)" opacity="0.44"/>
  <rect x="48" y="48" width="1104" height="804" fill="#FFFFFF" stroke="#E4E7EF" stroke-width="2" filter="url(#softShadow)"/>

  <g clip-path="url(#photoClip)">
    <image href="source-night-scene.png" x="72" y="72" width="1056" height="492" preserveAspectRatio="xMidYMid slice"/>
    <rect x="72" y="72" width="1056" height="492" fill="url(#photoShade)"/>
  </g>

  <g transform="translate(100 98)">
    <rect x="0" y="0" width="266" height="56" fill="#FFFFFF" fill-opacity="0.92" stroke="#E4E7EF"/>
    <rect x="18" y="14" width="28" height="28" rx="7" fill="#0E1726"/>
    <rect x="25" y="21" width="6" height="6" rx="1.5" fill="#FFFFFF" opacity="0.45"/>
    <rect x="34" y="21" width="6" height="6" rx="1.5" fill="#FFFFFF" opacity="0.7"/>
    <rect x="25" y="30" width="6" height="6" rx="1.5" fill="#FFFFFF" opacity="0.7"/>
    <rect x="34" y="30" width="6" height="6" rx="1.5" fill="#FFFFFF"/>
    <text x="60" y="36" fill="#0E1726" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">MCH Projects</text>
  </g>

  <g transform="translate(840 102)" font-family="Arial, Helvetica, sans-serif">
    <rect x="0" y="0" width="256" height="48" fill="#1E4DD8"/>
    <text x="22" y="31" fill="#FFFFFF" font-size="14" font-weight="900" letter-spacing="2.3">MIDNIGHT AUDIT</text>
  </g>

  <g transform="translate(100 589)">
    <text x="0" y="0" fill="#1E4DD8" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="900" letter-spacing="2.4">ONE CLEAR BOTTLENECK</text>
    <text x="0" y="74" fill="#0E1726" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700">What keeps you</text>
    <text x="0" y="142" fill="#0E1726" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700">up late at night?</text>
    <text x="3" y="202" fill="#56617A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="500">Pick the problem before you pick the tactic.</text>
  </g>

  <g transform="translate(670 576)" font-family="Arial, Helvetica, sans-serif">
    <rect x="0" y="0" width="422" height="92" fill="#EEF2FE" stroke="#C8D0DE" stroke-width="2"/>
    <circle cx="43" cy="46" r="22" fill="#1E4DD8"/>
    <text x="33" y="54" fill="#FFFFFF" font-size="22" font-weight="900">1</text>
    <text x="82" y="37" fill="#0E1726" font-size="22" font-weight="900">Digital systems</text>
    <text x="82" y="65" fill="#56617A" font-size="20" font-weight="600">to solve organization headaches</text>

    <rect x="0" y="116" width="422" height="92" fill="#FFFFFF" stroke="#C8D0DE" stroke-width="2"/>
    <circle cx="43" cy="162" r="22" fill="#E2A33A"/>
    <text x="32" y="170" fill="#0E1726" font-size="22" font-weight="900">2</text>
    <text x="82" y="153" fill="#0E1726" font-size="22" font-weight="900">Digital marketing</text>
    <text x="82" y="181" fill="#56617A" font-size="20" font-weight="600">to drive business growth / leads</text>

    <rect x="0" y="218" width="258" height="58" fill="#1E4DD8"/>
    <text x="24" y="255" fill="#FFFFFF" font-size="22" font-weight="900">Book a systems audit</text>
  </g>

  <g transform="translate(98 806)" font-family="Arial, Helvetica, sans-serif">
    <rect x="0" y="0" width="188" height="34" fill="#FFFFFF" stroke="#E4E7EF"/>
    <text x="18" y="23" fill="#56617A" font-size="12" font-weight="900" letter-spacing="1.8">OWNER-LED TEAMS</text>
  </g>
</svg>
